services:
  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto-1
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iotpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_user} -d ${POSTGRES_DB:-iot_monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Node-RED (Simulation Engine) ───────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: nodered-1
    environment:
      - TZ=${TZ:-Africa/Tunis}
      - FLOWS=flow.json
    ports:
      - "1880:1880"
    volumes:
      - ./simulation:/data
    depends_on:
      - mosquitto
      - postgres
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: backend-1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      # Database — async driver for the app; Alembic env.py converts it to psycopg2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iot_user}:${POSTGRES_PASSWORD:-iotpassword}@postgres:5432/${POSTGRES_DB:-iot_monitor}
      # MQTT
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-cooperative/device/+/telemetry}
      # Auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      # Superuser seed (entrypoint creates this user on first deploy)
      SEED_SUPERUSER_EMAIL: ${SEED_SUPERUSER_EMAIL:-admin@coop.local}
      SEED_SUPERUSER_USERNAME: ${SEED_SUPERUSER_USERNAME:-admin}
      SEED_SUPERUSER_PASSWORD: ${SEED_SUPERUSER_PASSWORD:-Admin1234!}
      # SMTP (email OTP)
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-CoopIoT Monitor}
      SMTP_SENDER_ADDR: ${SMTP_SENDER_ADDR:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── React frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # /api is reverse-proxied by Nginx to http://backend:8000
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        # Browser connects directly to Mosquitto WebSocket — must be reachable from the client
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:9001}
    container_name: frontend-1
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
