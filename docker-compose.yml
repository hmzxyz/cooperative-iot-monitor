services:

  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"   # TCP — backend + simulator
      - "9001:9001"   # WebSocket — browser MQTT.js client
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-iot_monitor}
      POSTGRES_USER:     ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iotpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_user}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-iot_user}:${POSTGRES_PASSWORD:-iotpassword}@postgres:5432/${POSTGRES_DB:-iot_monitor}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      JWT_SECRET_KEY:   ${JWT_SECRET_KEY:-dev-secret-change-in-production}
    restart: unless-stopped

  # ── React frontend (Vite build → Nginx) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # /api is resolved by Nginx proxy_pass to http://backend:8000
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        # Browser connects directly to mosquitto WebSocket (port 9001 exposed on host)
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:9001}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── n8n workflow automation ────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Africa/Tunis}
      TZ: ${TZ:-Africa/Tunis}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
      - postgres
      - mosquitto
    restart: unless-stopped

  # ── ESP32 simulator (optional — comment out to use real hardware) ──────────
  simulator:
    build:
      context: ./esp32-simulators
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER_URL:    mqtt://mosquitto:1883
      PUBLISH_INTERVAL_MS: ${PUBLISH_INTERVAL_MS:-2000}
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
